version: '3.8'

services:
  # база данных
  postgres:
    image: postgres:15
    container_name: spa_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spa_network

  # бэкенд
  backend:
    build: ./backend
    container_name: spa_backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - spa_network

  # фронтенд
  frontend:
    build: ./frontend
    container_name: spa_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - spa_network

volumes:
  postgres_data:

networks:
  spa_network:
    driver: bridge