<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — Iron Fit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-white">

    <!-- Шапка -->
    <header class="bg-white dark:bg-zinc-900 py-5 border-b border-zinc-200 dark:border-zinc-700 sticky top-0">
        <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 text-2xl font-bold">
                <i class="fa-solid fa-dumbbell text-orange-500"></i>
                Iron Fit
            </a>

            <nav class="hidden md:flex gap-8 text-lg">
                <a href="index.html" class="hover:text-orange-500">Главная</a>
                <a href="programs.html" class="hover:text-orange-500">Программы</a>
                <a href="about.html" class="hover:text-orange-500">О нас</a>
                <a href="contact.html" class="hover:text-orange-500">Контакты</a>
            </nav>

            <button id="theme-btn" class="w-10 h-10 flex items-center justify-center text-xl hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-6 py-16">
        <h1 class="text-4xl font-bold text-center mb-8">Контакты</h1>
        
        <div class="max-w-lg mx-auto bg-white dark:bg-zinc-900 p-8 rounded-3xl border border-zinc-200 dark:border-zinc-700">
            <form id="contactForm">
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Ваше имя</label>
                    <input type="text" id="name" required 
                           class="w-full px-5 py-4 bg-zinc-50 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-2xl focus:outline-none">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" required 
                           class="w-full px-5 py-4 bg-zinc-50 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-2xl focus:outline-none">
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-medium mb-2">Сообщение</label>
                    <textarea id="message" rows="5" required
                              class="w-full px-5 py-4 bg-zinc-50 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-2xl focus:outline-none"></textarea>
                </div>

                <button type="submit" 
                        class="w-full bg-orange-600 hover:bg-orange-700 text-white py-4 rounded-2xl font-medium text-lg">
                    Отправить сообщение
                </button>
            </form>
        </div>
    </div>

    <footer class="bg-white dark:bg-zinc-900 py-8 text-center text-sm text-zinc-500 dark:text-zinc-400">
        © 2026 Iron Fit • Москва
    </footer>

    <script src="js/script.js"></script>

    <script>
        // Простая валидация формы
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();

            if (name === "" || email === "" || message === "") {
                alert("Пожалуйста, заполните все поля.");
            } else {
                alert("Спасибо! Ваше сообщение отправлено.");
                this.reset(); // очищаем форму
            }
        });
    </script>
</body>
</html>
