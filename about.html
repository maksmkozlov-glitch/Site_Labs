<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О нас — Iron Fit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-white">

    <!-- Шапка -->
    <header class="bg-white dark:bg-zinc-900 py-5 border-b border-zinc-200 dark:border-zinc-700 sticky top-0">
        <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 text-2xl font-bold">
                <i class="fa-solid fa-dumbbell text-orange-500"></i>
                Iron Fit
            </a>

            <nav class="hidden md:flex gap-8 text-lg">
                <a href="index.html" class="hover:text-orange-500">Главная</a>
                <a href="programs.html" class="hover:text-orange-500">Программы</a>
                <a href="about.html" class="hover:text-orange-500">О нас</a>
                <a href="contact.html" class="hover:text-orange-500">Контакты</a>
            </nav>

            <button id="theme-btn" class="w-10 h-10 flex items-center justify-center text-xl hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-bold text-center mb-8">О нас</h1>
        <p class="text-center text-zinc-600 dark:text-zinc-400 max-w-2xl mx-auto mb-12">
            Iron Fit — небольшой уютный фитнес-зал, где каждый может начать тренироваться и прогрессировать.
        </p>

        <h2 class="text-3xl font-bold text-center mb-10">Часто задаваемые вопросы</h2>

        <div id="faqContainer" class="max-w-3xl mx-auto space-y-4">
            <!-- Аккордеон заполняется через JS -->
        </div>
    </div>

    <footer class="bg-white dark:bg-zinc-900 py-8 text-center text-sm text-zinc-500 dark:text-zinc-400">
        © 2026 Iron Fit • Москва
    </footer>

    <script src="js/script.js"></script>

    <script>
        const faqItems = [
            { question: "Сколько стоит занятие?", answer: "Разовое посещение — 800 ₽. Абонемент на месяц от 4500 ₽." },
            { question: "Есть ли пробная тренировка?", answer: "Да, первая тренировка с тренером бесплатная." },
            { question: "Подходят ли занятия новичкам?", answer: "Да, у нас есть специальные программы для начинающих." },
            { question: "Нужна ли справка от врача?", answer: "Не обязательна, но рекомендуется при проблемах со здоровьем." }
        ];

        function createFAQ() {
            const container = document.getElementById('faqContainer');
            container.innerHTML = '';

            faqItems.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl overflow-hidden";
                div.innerHTML = `
                    <button class="w-full px-6 py-5 text-left flex justify-between items-center hover:bg-zinc-50 dark:hover:bg-zinc-800">
                        <span class="font-medium">${item.question}</span>
                        <i class="fa-solid fa-chevron-down transition-transform"></i>
                    </button>
                    <div class="answer hidden px-6 pb-6 text-zinc-600 dark:text-zinc-400">
                        ${item.answer}
                    </div>
                `;
                container.appendChild(div);
            });

            document.querySelectorAll('#faqContainer button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const answer = btn.nextElementSibling;
                    const icon = btn.querySelector('i');

                    document.querySelectorAll('.answer').forEach(a => a.classList.add('hidden'));
                    answer.classList.toggle('hidden');
                    icon.classList.toggle('rotate-180');
                });
            });
        }

        window.onload = createFAQ;
    </script>
</body>
</html>
